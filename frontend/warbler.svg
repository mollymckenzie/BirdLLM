<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tail -->
  <polygon points="14,38 4,30 4,46" fill="#D4A800"/>
  <!-- Body -->
  <ellipse cx="33" cy="37" rx="19" ry="13" fill="#FFD700"/>
  <!-- Wing shading -->
  <ellipse cx="28" cy="39" rx="11" ry="7" fill="#E6BB00" transform="rotate(-10 28 39)"/>
  <!-- Head -->
  <circle cx="46" cy="25" r="12" fill="#FFD700"/>
  <!-- Cheek flush (male warbler streaking) -->
  <ellipse cx="49" cy="29" rx="5" ry="3" fill="#FF8C00" opacity="0.5"/>
  <!-- Eye -->
  <circle cx="50" cy="23" r="3" fill="#1a1a1a"/>
  <circle cx="51" cy="22" r="1" fill="white"/>
  <!-- Beak -->
  <polygon points="57,25 66,23 57,21" fill="#CC7A00"/>
  <!-- Feet -->
  <line x1="30" y1="50" x2="26" y2="60" stroke="#CC7A00" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="50" x2="41" y2="60" stroke="#CC7A00" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="60" x2="21" y2="59" stroke="#CC7A00" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="60" x2="27" y2="64" stroke="#CC7A00" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="60" x2="46" y2="59" stroke="#CC7A00" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="60" x2="40" y2="64" stroke="#CC7A00" stroke-width="2" stroke-linecap="round"/>
</svg>
